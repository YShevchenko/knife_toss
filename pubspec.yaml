name: knife_toss
description: "Knife Toss - Tap to throw knives at a rotating log"
publish_to: 'none'
version: 1.0.10+10

environment:
  sdk: ^3.11.3

dependencies:
  flutter:
    sdk: flutter
  flutter_localizations:
    sdk: flutter
  flutter_riverpod: ^3.3.1
  shared_preferences: ^2.5.5
  in_app_purchase: ^3.2.3
  google_fonts: ^8.0.2
  audioplayers: ^6.6.0
  equatable: ^2.0.8
  intl: any


dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0
  mocktail: ^1.0.4
  flutter_launcher_icons: ^0.14.3
  flutter_native_splash: ^2.4.4

flutter:
  uses-material-design: true
  assets:
    - assets/icon/
    - assets/audio/

flutter_native_splash:
  color: "#6B7280"
  android: true
  ios: true

flutter_launcher_icons:
  android: true
  ios: true
  image_path: "assets/icon/app_icon.png"
  remove_alpha_ios: true
  min_sdk_android: 21
